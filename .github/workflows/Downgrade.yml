name: Downgrade
on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
jobs:
  test:
    if: false  # Disabled: PrecompileTools v1.0.0 (compat lower bound) fails on Julia 1.10. See #58.
    uses: "SciML/.github/.github/workflows/downgrade.yml@v1"
    with:
      julia-version: "1.10"
      skip: "Pkg,TOML"
      allow-reresolve: false
    secrets: "inherit"
