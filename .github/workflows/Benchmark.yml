name: Benchmarks

on:
  pull_request:
    paths:
      - "src/**"
      - "bench/**"
      - "Project.toml"
      - ".github/workflows/Benchmark.yml"
  workflow_dispatch:

# Only one benchmark run per PR at a time; cancel stale ones.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  benchmark:
    uses: "SciML/.github/.github/workflows/benchmark.yml@v1"
    with:
      julia-version: "1.11"
    secrets: "inherit"
