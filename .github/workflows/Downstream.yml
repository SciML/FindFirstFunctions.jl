name: IntegrationTest
on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - main
    tags:
      - v*
    paths-ignore:
      - 'docs/**'
  schedule:
    - cron: '36 13 * * 5'

jobs:
  test:
    name: ${{ matrix.package.repo }}/${{ matrix.package.group }}/${{ matrix.version }}/${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        package:
          - {user: SciML, repo: DataInterpolations.jl, group: Core}
          - {user: SciML, repo: ModelingToolkit.jl, group: InterfaceI}
        version:
          - '1'
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    uses: "SciML/.github/.github/workflows/downstream.yml@v1"
    with:
      julia-version: ${{ matrix.version }}
      os: ${{ matrix.os }}
      owner: ${{ matrix.package.user }}
      repo: ${{ matrix.package.repo }}
      group: ${{ matrix.package.group }}
    secrets: "inherit"
