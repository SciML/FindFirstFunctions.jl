name: Benchmarks

on:
  pull_request:
    paths:
      - "src/**"
      - "bench/**"
      - "benchmark/**"
      - "Project.toml"
      - ".github/workflows/Benchmark.yml"
  workflow_dispatch:

# Only one benchmark run per PR at a time; cancel stale ones.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: MilesCranmer/AirspeedVelocity.jl@action-v1
        with:
          julia-version: "1.11"
          bench-on: ${{ github.event.pull_request.head.sha || github.sha }}
          job-summary: "true"
